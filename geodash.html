<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VeloCity: Singularity | Polished Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap');
        :root { --c: #00f2ff; --m: #ff00ea; --y: #ffff00; --bg: #050508; --rd: #ff4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Orbitron'; overflow: hidden; }
        canvas { display: block; }
        
        /* --- POLISHED MENU OVERHAUL (CSS ONLY) --- */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: radial-gradient(circle, #101015 0%, #050508 100%); transition: 0.8s; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); filter: blur(10px); }
        
        h1 { font-size: 90px; font-weight: 900; letter-spacing: 15px; margin-bottom: 40px; background: linear-gradient(to bottom, #fff 30%, var(--c)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(0,242,255,0.4)); animation: titleFloat 4s ease-in-out infinite; }
        @keyframes titleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn { background: rgba(0,242,255,0.05); border: 1px solid var(--c); color: var(--c); padding: 15px 50px; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; font-size: 14px; letter-spacing: 2px; transition: 0.4s; position: relative; overflow: hidden; }
        .btn:hover { background: var(--c); color: #000; box-shadow: 0 0 40px var(--c); transform: scale(1.05); }

        /* --- FACE SELECTOR UI --- */
        #face-pane { display: flex; gap: 20px; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid #222; }
        .face-opt { width: 50px; height: 50px; border: 2px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.3s; background: #000; }
        .face-opt:hover { border-color: var(--c); }
        .face-opt.active { border-color: var(--c); box-shadow: 0 0 15px var(--c); transform: scale(1.1); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 30px; }
        .card { width: 140px; height: 90px; background: #0a0a0f; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .card:hover { border-color: var(--m); background: #111; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,0,234,0.2); }
    </style>
</head>
<body>

<div id="scr-main" class="screen">
    <h1>SINGULARITY</h1>
    
    <div style="font-size: 10px; color: #666; margin-bottom: 10px; letter-spacing: 4px;">CHOOSE_NEURAL_INTERFACE</div>
    <div id="face-pane">
        <div class="face-opt active" onclick="Face.set(0, this)">🙂</div>
        <div class="face-opt" onclick="Face.set(1, this)">🕶️</div>
        <div class="face-opt" onclick="Face.set(2, this)">😡</div>
        <div class="face-opt" onclick="Face.set(3, this)">🤖</div>
    </div>

    <button class="btn" onclick="Nav.go('scr-lvl')">INITIALIZE_SYSTEM</button>
    <button class="btn" style="border-color:#444; color:#444; margin-top:10px;" onclick="Architect.enable()">ARCHITECT_MODE</button>
</div>

<div id="scr-lvl" class="screen hidden">
    <div class="grid" id="lvl-grid"></div>
    <button class="btn" style="margin-top: 40px;" onclick="Nav.go('scr-main')">DISCONNECT</button>
</div>

<div id="hud">
    <div class="bar-wrap"><div id="bar-fill"></div></div>
    <div class="stats">
        ID: <span id="st-lvl">1</span> | <span id="st-name" style="color:var(--m)">NULL</span><br>
        ATTEMPTS: <span id="st-att">1</span> | STARS: <span id="st-star">0</span>/3
    </div>
</div>

<div id="editor-panel" style="display:none; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:200;">
    <button class="btn" onclick="Nav.go('scr-main')">EXIT_EDITOR</button>
</div>

<canvas id="stage"></canvas>

<script>
// --- [ORIGINAL CODE BLOCK - DO NOT MODIFY] ---
const App = {
    canvas: document.getElementById('stage'), ctx: null,
    w: window.innerWidth, h: window.innerHeight, floor: window.innerHeight - 150,
    player: null, entities: [], camX: 0, lerpX: 0,
    activeLvl: 0, stars: 0, state: 'MENU', last: 0,
    manifest: [
        ["BEGINNER", "EASY", 650, 1], ["TRIPLE_THREAT", "NORMAL", 700, 1.2],
        ["PLATFORMER", "HARD", 650, 1.5], ["SPEED_DEMON", "INSANE", 900, 1],
        ["THE_CLIMB", "HARD", 600, 2], ["GRAVITY_X", "DEMON", 750, 1.2],
        ["PRECISION", "DEMON", 680, 0.8], ["END_OF_LINE", "EXTREME", 850, 1.5],
        ["CYBER_PULSE", "EXTREME", 950, 1.3], ["SINGULARITY", "IMPOSSIBLE", 1100, 2]
    ],
    init(idx) {
        this.ctx = this.canvas.getContext('2d'); this.canvas.width = this.w; this.canvas.height = this.h;
        this.activeLvl = idx; this.stars = 0; this.player = new Player(this.manifest[idx][2]);
        this.buildLevel(idx); this.bind(); this.state = 'PLAY'; Nav.go('hud');
        document.getElementById('st-name').innerText = this.manifest[idx][0];
        requestAnimationFrame((t) => this.loop(t));
    },
    bind() {
        const input = (v) => { if(this.player && this.state !== 'EDIT') this.player.isJumping = v; };
        window.onkeydown = (e) => { if(e.code === 'Space') input(true); if(e.code === 'Escape') Nav.go('scr-main'); };
        window.onkeyup = (e) => { if(e.code === 'Space') input(false); };
        this.canvas.onmousedown = (e) => { if(this.state === 'EDIT') Architect.place(e); else input(true); };
        window.onmouseup = () => input(false);
    },
    buildLevel(idx) {
        this.entities = []; const m = this.manifest[idx]; const spacing = 800 * m[3];
        for(let i=0; i<1500; i++) this.entities.push(new Obj('block', i*60, this.floor));
        for(let i=1; i<30; i++) {
            let x = i * spacing;
            if(idx === 1) { this.entities.push(new Obj('spike', x, this.floor-60), new Obj('spike', x+60, this.floor-60), new Obj('spike', x+120, this.floor-60)); }
            else if(idx === 2) { this.entities.push(new Obj('block', x, this.floor-120), new Obj('block', x+60, this.floor-120)); }
            else { this.entities.push(new Obj('spike', x, this.floor-60)); }
            if(i % 5 === 0) this.entities.push(new Obj('star', x + 300, this.floor - 150));
        }
        document.getElementById('st-lvl').innerText = idx + 1;
    },
    loop(t) {
        let dt = Math.min((t - this.last) / 1000, 0.016); this.last = t;
        this.ctx.fillStyle = '#050508'; this.ctx.fillRect(0,0,this.w,this.h);
        if(this.state === 'PLAY' || this.state === 'EDIT') this.update(dt);
        this.draw(); requestAnimationFrame((t) => this.loop(t));
    },
    update(dt) {
        if(this.state === 'EDIT') { if(this.player.isJumping) this.camX += 20; }
        else { this.player.tick(dt); this.camX = this.player.x - 450; }
        this.lerpX += (this.camX - this.lerpX) * 0.15;
        if(this.state === 'EDIT' || this.state === 'MENU') return;
        this.entities.forEach(e => {
            if(Math.abs(e.x - this.player.x) < 600) {
                if(this.player.hit(e)) {
                    if(e.type === 'spike') this.die();
                    if(e.type === 'star' && !e.done) { e.done = true; this.stars++; document.getElementById('st-star').innerText = this.stars; }
                    if(e.type === 'block') {
                        if(this.player.vy >= 0 && (this.player.y + 50) <= e.y + 30) { this.player.y = e.y - 50; this.player.vy = 0; this.player.onFloor = true; }
                        else this.die();
                    }
                }
            }
        });
    },
    die() {
        this.player.attempts++; document.getElementById('st-att').innerText = this.player.attempts;
        this.player.x = 100; this.player.y = this.floor-100; this.player.vy = 0;
        this.camX = 0; this.lerpX = 0; this.entities.forEach(e => e.done = false);
    },
    win() { this.state = 'MENU'; Nav.go('scr-lvl'); alert("SYNC_COMPLETE"); },
    draw() {
        this.ctx.save(); this.ctx.translate(-this.lerpX, 0);
        this.entities.forEach(e => e.draw(this.ctx));
        if(this.player) this.player.draw(this.ctx);
        this.ctx.restore();
    }
};

class Player {
    constructor(speed) { this.x=100; this.y=0; this.vy=0; this.attempts=1; this.onFloor=false; this.isJumping=false; this.rot=0; this.speed=speed; }
    tick(dt) {
        this.x += this.speed * dt; this.vy += 4500 * dt;
        if(this.onFloor && this.isJumping) this.vy = -1300;
        this.y += this.vy * dt; if(this.y > App.h) App.die();
        if(!this.onFloor) this.rot += 580 * dt * (Math.PI/180);
        else { let t = Math.round(this.rot/(Math.PI/2))*(Math.PI/2); this.rot += (t-this.rot)*0.4; }
        this.onFloor = false;
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x+25, this.y+25); ctx.rotate(this.rot);
        ctx.fillStyle='#00f2ff'; ctx.fillRect(-25,-25,50,50); ctx.restore();
    }
    hit(o) { return (this.x+15 < o.x+60 && this.x+35 > o.x && this.y < o.y+60 && this.y+48 > o.y); }
}

class Obj {
    constructor(t, x, y) { this.type=t; this.x=x; this.y=y; this.done=false; }
    draw(ctx) {
        ctx.fillStyle = this.type === 'block' ? '#0a0a0f' : '#ff0044';
        if(this.type === 'block') { ctx.fillRect(this.x,this.y,60,60); ctx.strokeStyle="#00f2ff"; ctx.strokeRect(this.x,this.y,60,60); }
        else { ctx.beginPath(); ctx.moveTo(this.x,this.y+60); ctx.lineTo(this.x+30,this.y+10); ctx.lineTo(this.x+60,this.y+60); ctx.fill(); }
    }
}

const Nav = {
    go(id) {
        App.state = (id === 'scr-main' || id === 'scr-lvl') ? 'MENU' : App.state;
        document.querySelectorAll('.screen, #hud').forEach(s => { s.classList.add('hidden'); s.style.display = 'none'; });
        let target = document.getElementById(id);
        target.style.display = (id === 'hud') ? 'block' : 'flex';
        setTimeout(() => target.classList.remove('hidden'), 50);
        if(id === 'scr-lvl') this.build();
    },
    build() {
        const g = document.getElementById('lvl-grid'); g.innerHTML = '';
        App.manifest.forEach((m, i) => {
            let c = document.createElement('div'); c.className = 'card';
            c.innerHTML = `<span>${i+1}</span><div style="font-size:8px; color:#ff00ea">${m[1]}</div>`;
            c.onclick = () => App.init(i); g.appendChild(c);
        });
    }
};

const Architect = {
    tool: 'spike',
    enable() { App.init(0); App.state = 'EDIT'; document.getElementById('editor-panel').style.display = 'flex'; },
    place(e) { let gx = Math.floor((e.clientX + App.lerpX)/60)*60; let gy = Math.floor(e.clientY/60)*60; App.entities.push(new Obj(this.tool, gx, gy)); }
};
// --- [END ORIGINAL CODE] ---

/** INJECTION MODULE: COSMETICS, SLOWDOWN, AND PARTICLES **/

const Face = {
    active: 0,
    list: [
        (c) => { c.fillRect(-12,-8,8,8); c.fillRect(4,-8,8,8); c.fillRect(-10,8,20,4); }, // Smiley
        (c) => { c.fillRect(-15,-10,30,8); c.fillRect(-5,5,10,10); }, // Sunglasses
        (c) => { c.beginPath(); c.moveTo(-15,-10); c.lineTo(-5,-5); c.stroke(); c.moveTo(15,-10); c.lineTo(5,-5); c.stroke(); c.fillRect(-10,8,20,4); }, // Angry
        (c) => { c.strokeRect(-15,-10,30,20); c.fillRect(-5,-5,10,10); } // Robot
    ],
    set(idx, el) {
        this.active = idx;
        document.querySelectorAll('.face-opt').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }
};

const Particles = {
    active: [],
    spawn(x, y) {
        for(let i=0; i<15; i++) {
            this.active.push({ x, y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1, color: '#00f2ff' });
        }
    },
    update(ctx) {
        this.active.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 5, 5);
            if(p.life <= 0) this.active.splice(i, 1);
        });
        ctx.globalAlpha = 1;
    }
};

// Injection: Slow Down Physics (Speed multiplier 0.8)
const originalTick = Player.prototype.tick;
Player.prototype.tick = function(dt) {
    originalTick.call(this, dt * 0.85); 
};

// Injection: Faces and Particles to Draw
const originalDrawPlayer = Player.prototype.draw;
Player.prototype.draw = function(ctx) {
    ctx.save();
    ctx.translate(this.x+25, this.y+25);
    ctx.rotate(this.rot);
    ctx.shadowBlur=15; ctx.shadowColor='#00f2ff';
    ctx.fillStyle='#00f2ff'; ctx.fillRect(-25,-25,50,50);
    ctx.shadowBlur=0; ctx.fillStyle='#000'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
    Face.list[Face.active](ctx);
    ctx.restore();
};

// Injection: Death Particles
const originalDie = App.die;
App.die = function() {
    Particles.spawn(this.player.x + 25, this.player.y + 25);
    originalDie.call(this);
};

// Hook into App.draw for the particles
const originalDrawAll = App.draw;
App.draw = function() {
    originalDrawAll.call(this);
    this.ctx.save();
    this.ctx.translate(-this.lerpX, 0);
    Particles.update(this.ctx);
    this.ctx.restore();
};

window.onload = () => Nav.go('scr-main');
</script>
</body>
</html>
